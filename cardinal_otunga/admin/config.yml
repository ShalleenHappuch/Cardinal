backend:
  name: git-gateway
  branch: main

# 1. Where Git Gateway will physically drop uploaded PDFs/images inside my repository
media_folder: "cardinal_otunga/assets/uploads"
# 2. The clean web URL path my HTML/JS will use to link to those files online
public_folder: "cardinal_otunga/assets/uploads"

media_library:
  name: cloudinary
  config:
    cloud_name: "dtgmz36er"
    api_key: "917969655193453"

collections:
  - name: "portal_data"
    label: "School Portal Data"
    delete: false
    editor:
      preview: false
    files:
      - name: "assignments"
        label: "Student Assignments"
        file: "cardinal_otunga/assets/data/assignments.json" # One single file for JS to fetch!
        format: "json"
        fields:
          - label: "Assignments List"
            name: "items"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Assignment Title", name: "title", widget: "string" }
              - { label: "Date Issued", name: "date", widget: "date", format: "MMM DD, YYYY" }
              - label: "Target Form/Class"
                name: "form"
                widget: "select"
                options: ["Form 1", "Form 2", "Form 3", "Form 4"]
              - label: "Department"
                name: "department"
                widget: "select"
                options: ["Sciences", "Mathematics", "Languages", "Humanities", "Applied Sciences", "Business Studies", "Arts"]
              - label: "Subject"
                name: "subject"
                widget: "select"
                options: [
                  "Mathematics", "English", "Kiswahili", "Biology", 
                  "Chemistry", "Physics", "History", "Geography", 
                  "CRE", "Business Studies", "Agriculture", "Computer Studies", "French", "Music", "Fine Arts"
                ]
              - { label: "Upload Homework File (PDF)", name: "assignment_file", widget: "file" }

      - name: "calendar"
        label: "School Calendar"
        file: "cardinal_otunga/assets/data/calendar.json" # One single file for JS to fetch!
        format: "json"
        fields:
          - label: "Upcoming Events List"
            name: "events"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Event Title", name: "title", widget: "string" }

              # Swap out manual day/month text fields for this single unified date picker:
              - { label: "Event Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              # - { label: "Event Day (Number)", name: "day", widget: "string", hint: "e.g., 24" }
              # - { label: "Event Month (Short)", name: "month", widget: "string", hint: "e.g., Jun" }
              - { label: "Category", name: "category", widget: "select", options: ["Academic", "Sports", "Welfare", "Holiday"] }
              - { label: "Time/Duration", name: "time", widget: "string", hint: "e.g., 09:00 AM — 04:00 PM" }
              - { label: "Event Details", name: "body", widget: "text" }




